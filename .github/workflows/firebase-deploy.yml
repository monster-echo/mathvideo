name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: firebase-hosting-live
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Write Firebase framework env file
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
          FB_ADMIN_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FB_ADMIN_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FB_ADMIN_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FB_FIRESTORE_DATABASE_ID: ${{ secrets.FIREBASE_FIRESTORE_DATABASE_ID }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_BASE_URL: ${{ secrets.DEEPSEEK_API_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          DEEPSEEK_SYSTEM_PROMPT: ${{ secrets.DEEPSEEK_SYSTEM_PROMPT }}
          MANIMBOX_WORKER_TOKEN: ${{ secrets.MANIMBOX_WORKER_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_TEACHER_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_TEACHER_PRO_MONTHLY }}
          STRIPE_PRICE_TEACHER_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_TEACHER_PRO_YEARLY }}
          STRIPE_PRICE_CREATOR_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_CREATOR_PRO_MONTHLY }}
          STRIPE_PRICE_CREATOR_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_CREATOR_PRO_YEARLY }}
          STRIPE_PRICE_SCHOOL_TEAM_MONTHLY: ${{ secrets.STRIPE_PRICE_SCHOOL_TEAM_MONTHLY }}
          STRIPE_PRICE_SCHOOL_TEAM_YEARLY: ${{ secrets.STRIPE_PRICE_SCHOOL_TEAM_YEARLY }}
        run: |
          python3 << 'PYEOF'
          import os
          env_vars = [
              'NEXT_PUBLIC_FIREBASE_API_KEY',
              'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN',
              'NEXT_PUBLIC_FIREBASE_PROJECT_ID',
              'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET',
              'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID',
              'NEXT_PUBLIC_FIREBASE_APP_ID',
              'NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID',
              'FB_ADMIN_PROJECT_ID',
              'FB_ADMIN_CLIENT_EMAIL',
              'FB_ADMIN_PRIVATE_KEY',
              'FB_FIRESTORE_DATABASE_ID',
              'APP_BASE_URL',
              'DEEPSEEK_API_KEY',
              'DEEPSEEK_API_BASE_URL',
              'DEEPSEEK_MODEL',
              'DEEPSEEK_SYSTEM_PROMPT',
              'MANIMBOX_WORKER_TOKEN',
              'STRIPE_SECRET_KEY',
              'STRIPE_WEBHOOK_SECRET',
              'STRIPE_PRICE_TEACHER_PRO_MONTHLY',
              'STRIPE_PRICE_TEACHER_PRO_YEARLY',
              'STRIPE_PRICE_CREATOR_PRO_MONTHLY',
              'STRIPE_PRICE_CREATOR_PRO_YEARLY',
              'STRIPE_PRICE_SCHOOL_TEAM_MONTHLY',
              'STRIPE_PRICE_SCHOOL_TEAM_YEARLY',
          ]
          with open('.env.mathvideo-llm', 'w') as f:
              for key in env_vars:
                  value = os.environ.get(key, '')
                  value = value.replace('\n', '\\n')
                  f.write(f'{key}={value}\n')
          PYEOF

      - name: Verify required Firebase Admin vars
        run: |
          test -n "${{ secrets.FIREBASE_PROJECT_ID }}"
          test -n "${{ secrets.FIREBASE_CLIENT_EMAIL }}"
          test -n "${{ secrets.FIREBASE_PRIVATE_KEY }}"

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MATHVIDEO_LLM }}
          projectId: mathvideo-llm
          channelId: live
          force: true
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
